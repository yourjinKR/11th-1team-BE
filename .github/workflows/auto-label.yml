name: Auto Label

on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize, ready_for_review]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  auto-label:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout labeling script
        uses: actions/checkout@v5

      - name: Apply labels from PR context
        uses: actions/github-script@v9
        with:
          script: |
            const autoLabel = require('./.github/scripts/auto-label.js');
            await autoLabel({ github, context });
