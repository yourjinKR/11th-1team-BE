name: Auto Label

on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  auto-label:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout labeling script
        uses: actions/checkout@v4

      - name: Apply labels from PR context
        uses: actions/github-script@v7
        with:
          script: |
            const autoLabel = require('./.github/scripts/auto-label.js');
            await autoLabel({ github, context });
