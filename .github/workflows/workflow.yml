name: Java CI with Gradle and git-crypt

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install git-crypt
        run: sudo apt-get install -y git-crypt

      - name: Unlock git-crypt
        env:
          G_KEY: ${{ secrets.GIT_CRYPT_KEY }}
        run: |
          echo "$G_KEY" | base64 -d > ./secret.key
          git-crypt unlock ./secret.key
          rm -f ./secret.key

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew clean build -x test

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build/libs/*SNAPSHOT.jar"
          target: "/home/ubuntu/app/11th-1team-BE"
          strip_components: 2

      - name: Execute deploy script directly via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            REPOSITORY=/home/ubuntu/app/11th-1team-BE
            cd $REPOSITORY
            
            CURRENT_PID=$(ps -ef | grep java | grep "11th-1team-BE" | grep -v grep | awk '{print $2}')
            
            if [ -z "$CURRENT_PID" ]; then
              echo "> 현재 구동중인 애플리케이션이 없으므로 종료하지 않습니다."
            else
              echo "> kill -15 $CURRENT_PID"
              kill -15 $CURRENT_PID || true
              sleep 10
            fi
            
            JAR_NAME=$(ls -t *.jar | grep 'SNAPSHOT.jar' | head -n 1)
            JAR_PATH="${REPOSITORY}/${JAR_NAME}"
            
            if [ -z "${JAR_NAME}" ]; then
              echo "> 에러: 배포할 JAR 파일을 찾을 수 없습니다."
              exit 1
            fi
            
            echo "> 새 애플리케이션 배포: ${JAR_PATH}"
            nohup java -Dspring.profiles.active=prod -jar "${JAR_PATH}" > "${REPOSITORY}/nohup.out" 2>&1 < /dev/null &