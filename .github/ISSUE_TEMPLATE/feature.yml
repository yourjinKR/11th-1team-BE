name: "✨ Feature"
description: "새로운 기능 추가"
labels: ["✨ Feature"]
body:
  - type: dropdown
    attributes:
      label: 📅 처리 시기
      description: 이슈를 언제 처리해야 하는지 선택해 주세요.
      options:
        - P0
        - P1
        - P2
        - P3
    validations:
      required: true

  - type: dropdown
    attributes:
      label: 🚨 중요도
      description: 이슈의 중요도를 선택해 주세요.
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true

  - type: textarea
    attributes:
      label: 📄 설명
      description: 새로운 기능에 대한 설명을 작성해 주세요.
      placeholder: 자세히 적을수록 좋습니다!
    validations:
      required: true
  - type: textarea
    attributes:
      label: ✅ 작업할 내용
      description: 할 일을 체크박스 형태로 작성해주세요.
      placeholder: 최대한 세분화 해서 적어주세요!
    validations:
      required: true
  - type: textarea
    attributes:
      label: 🙋🏻 참고 자료
      description: 참고 자료가 있다면 작성해 주세요.
