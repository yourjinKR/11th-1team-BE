<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
</head>
<body style="margin: 0; padding: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #f9f9f9;">
<div style="max-width: 600px; margin: 40px auto; background-color: #ffffff; border-radius: 8px; border: 1px solid #e9e9e9; padding: 40px 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">

  <h2 style="color: #2B6CB0; margin-top: 0; margin-bottom: 20px; font-size: 24px; font-weight: 700;">KnockIn 신원 인증</h2>

  <p style="font-size: 16px; line-height: 1.6; color: #333333; margin-bottom: 30px;">
    안녕하세요, 노크인입니다.<br>
    안전한 매칭 시스템 이용을 위한 인증번호를 안내해 드립니다.<br>
    아래의 인증번호를 확인하신 후 해당 화면에 입력해 주세요.
  </p>

  <div style="text-align: center; margin: 30px 0; padding: 20px; background-color: #f7fafc; border: 1px dashed #cbd5e0; border-radius: 6px;">
    <span style="display: block; font-size: 14px; color: #718096; margin-bottom: 8px; font-weight: bold; letter-spacing: 0.5px;">인증번호 (Verification Code)</span>
    <strong style="font-size: 32px; color: #2B6CB0; letter-spacing: 4px; font-family: 'Courier New', Courier, monospace;">${authToken}</strong>
  </div>

  <p style="font-size: 12px; color: #718096; line-height: 1.5; margin-top: 30px;">
    * 본 인증번호는 발송된 시점으로부터 <strong>3분 동안만 유효</strong>합니다.<br>
    * 타인에게 인증번호가 노출되지 않도록 주의해 주세요.
  </p>

</div>
</body>
</html>
